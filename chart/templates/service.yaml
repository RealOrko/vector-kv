apiVersion: v1
kind: Service
metadata:
  name: {{ include "vector-kv.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vector-kv.labels" . | nindent 4 }}
spec:
  type: NodePort
  selector:
    app.kubernetes.io/component: server
    {{- include "vector-kv.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      nodePort: {{ .Values.service.nodePort }}
