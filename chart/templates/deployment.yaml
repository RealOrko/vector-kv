apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vector-kv.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vector-kv.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: server
      {{- include "vector-kv.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        rollme: {{ randAlphaNum 5 | quote }}
      labels:
        app.kubernetes.io/component: server
        {{- include "vector-kv.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vector-kv
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vector-kv.name" . }}-postgresql
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgres://{{ .Values.postgresql.username }}:$(PGPASSWORD)@{{ include "vector-kv.name" . }}-postgresql:5432/{{ .Values.postgresql.database }}?sslmode=disable"
            - name: LISTEN_ADDR
              value: ":{{ .Values.service.port }}"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
